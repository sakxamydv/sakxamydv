  <line x1="60" y1="240" x2="840" y2="240" stroke="#3a3a3a" stroke-width="1"/>
  <text x="840" y="236" fill="#5a5a5a" font-size="10" text-anchor="end" letter-spacing="1">COMPILED FROM FIRST PRINCIPLES</text>
