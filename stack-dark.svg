<svg viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, Consolas, monospace">
  <defs>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3a3a3a"/>
      <stop offset="1" stop-color="#e8e8e8"/>
    </linearGradient>
  </defs>

  <line x1="60" y1="20" x2="60" y2="240" stroke="#4a4a4a" stroke-width="1"/>

  <!-- layer rows: label, bar -->
  <!-- Layer 1 -->
  <text x="0" y="44" fill="#8a8a8a" font-size="11" letter-spacing="1">01</text>
  <text x="80" y="44" fill="#e8e8e8" font-size="13" letter-spacing="1">KERNEL / ARCH LINUX / HYPRLAND</text>
  <rect x="80" y="52" width="230" height="4" fill="url(#fade)"/>

  <!-- Layer 2 -->
  <text x="0" y="84" fill="#8a8a8a" font-size="11" letter-spacing="1">02</text>
  <text x="80" y="84" fill="#e8e8e8" font-size="13" letter-spacing="1">LANGUAGE / C, C++, PYTHON</text>
  <rect x="80" y="92" width="330" height="4" fill="url(#fade)"/>

  <!-- Layer 3 -->
  <text x="0" y="124" fill="#8a8a8a" font-size="11" letter-spacing="1">03</text>
  <text x="80" y="124" fill="#e8e8e8" font-size="13" letter-spacing="1">NETWORK / WIRESHARK, NMAP, BURP, SCAPY</text>
