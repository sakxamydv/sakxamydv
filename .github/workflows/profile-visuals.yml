name: Generate Profile Visuals

on:
  schedule:
    - cron: "0 0 * * *" # Runs every night at midnight
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    name: Generate Images
    
    steps:
      # 🔑 Fix: Tell the checkout step to use your custom token for pushing code later
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      # 🏙️ Renders the 3D Isometric City
      - name: GitHub Profile 3D City Graph
        uses: yoshi389111/github-profile-3d-contrib@0.9.0
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      # 📤 Commits and pushes the 3D map right back into your branch
      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff-index --quiet HEAD || git commit -m "Update profile 3D city asset"
          git push
